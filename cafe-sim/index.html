<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カフェ経営会計シミュレーション</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <!-- ========== HEADER (full width) ========== -->
  <header id="app-header">
    <div id="step-indicator">STEP <span id="step-current">-</span> / <span id="step-total">-</span></div>
    <h1 id="app-title">カフェ経営会計シミュレーション</h1>
    <div id="progress-container"><div id="progress-bar"></div></div>
  </header>

  <!-- ========== MAIN: left panel + right charts ========== -->
  <div id="main-content">

    <!-- ── LEFT: テキスト・操作パネル ── -->
    <div id="panel">

      <div id="panel-step-header">
        <span id="panel-phase-badge">開業準備</span>
        <h2 id="panel-step-title"></h2>
      </div>

      <p id="panel-description"></p>

      <!-- ボタン：問いかけの直下 -->
      <div id="panel-buttons">
        <button id="btn-execute" class="btn btn-execute">実行する</button>
        <button id="btn-next"    class="btn btn-next hidden">次の取引へ →</button>
        <button id="btn-prev"    class="btn btn-prev hidden">← 前の取引に戻る</button>
      </div>

      <!-- 勘定科目の動き（実行後に表示） -->
      <div id="panel-changes" class="hidden">
        <div class="panel-section-title">変動した勘定科目</div>
        <table id="changes-table">
          <thead>
            <tr><th>勘定科目</th><th>分類</th><th>変化</th></tr>
          </thead>
          <tbody id="changes-tbody"></tbody>
        </table>
      </div>

      <!-- 解説折り畳み（実行後に表示） -->
      <div id="panel-explain-section" class="hidden">
        <button id="btn-explain" class="btn-explain">解説を見る ▼</button>
        <div id="panel-explanation" class="hidden"></div>
      </div>

    </div><!-- /panel -->

    <!-- ── RIGHT: グラフエリア ── -->
    <div id="charts-wrapper">

      <!-- リプレイボタン -->
      <div id="charts-toolbar">
        <button id="btn-replay" class="btn-replay hidden">↺ もう一度見る</button>
      </div>

      <!-- BS Chart (上) -->
      <div class="chart-section">
        <div class="chart-section-label">
          <span class="chart-badge bs-badge">BS</span>
          貸借対照表
          <span class="chart-totals" id="bs-totals"></span>
        </div>
        <div class="chart-area" id="bs-chart">
          <div class="chart-col" id="bs-left"></div>
          <div class="chart-divider"></div>
          <div class="chart-col" id="bs-right"></div>
        </div>
      </div>

      <!-- PL Chart (下) -->
      <div class="chart-section">
        <div class="chart-section-label">
          <span class="chart-badge pl-badge">PL</span>
          損益計算書
          <span class="chart-totals" id="pl-totals"></span>
        </div>
        <div class="chart-area" id="pl-chart">
          <div class="chart-col" id="pl-left"></div>
          <div class="chart-divider"></div>
          <div class="chart-col" id="pl-right"></div>
        </div>
      </div>

    </div><!-- /charts-wrapper -->

    <!-- ── RIGHT-2: 財務諸表（数値形式） ── -->
    <div id="statements">

      <!-- BS 勘定式 -->
      <div class="stmt-section">
        <div class="stmt-title">貸借対照表（勘定式）</div>
        <div class="stmt-bs">
          <div class="stmt-bs-col" id="stmt-bs-left"></div>
          <div class="stmt-bs-divider"></div>
          <div class="stmt-bs-col" id="stmt-bs-right"></div>
        </div>
      </div>

      <!-- PL 報告式 -->
      <div class="stmt-section">
        <div class="stmt-title">損益計算書（報告式）</div>
        <div id="stmt-pl"><div class="stmt-empty">（まだ収益・費用がありません）</div></div>
      </div>

    </div><!-- /statements -->

  </div><!-- /main-content -->

</div><!-- /app -->

<!-- ========== INTRO OVERLAY ========== -->
<div id="intro-overlay">
  <div class="overlay-card">
    <div class="overlay-icon">☕</div>
    <h1>カフェ経営<br>会計シミュレーション</h1>
    <p>カフェの開業から運営・決算までの取引を通して、<br>BSとPLの動きをリアルタイムで体験しましょう。</p>
    <ul class="feature-list">
      <li>📊 15の取引ステップ</li>
      <li>⚡ 意思決定→グラフが即変動</li>
      <li>💡 各取引の会計解説付き</li>
    </ul>
    <button id="btn-start" class="btn btn-execute">開始する</button>
  </div>
</div>

<!-- ========== SUMMARY OVERLAY ========== -->
<div id="summary-overlay" class="hidden">
  <div class="overlay-card">
    <div class="overlay-icon">🎉</div>
    <h2>お疲れ様でした！</h2>
    <div id="summary-body"></div>
    <button id="btn-reset" class="btn btn-next">最初からやり直す</button>
  </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
